<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wedding Template Store</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      background: #f6f3ef;
      color: #2b2b2b;
    }
    .wrap {
      max-width: 960px;
      margin: 0 auto;
      padding: 64px 24px;
      text-align: center;
    }
    h1 {
      font-size: 42px;
      margin-bottom: 12px;
    }
    p {
      font-size: 18px;
      color: #666;
    }
    .card {
      margin: 40px auto 0;
      max-width: 420px;
      background: #fff;
      border-radius: 18px;
      padding: 28px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }
    .price {
      font-size: 28px;
      margin: 16px 0;
      color: #111;
    }
    .btn {
      display: inline-block;
      margin-top: 10px;
      padding: 12px 22px;
      background: #111;
      color: #fff;
      text-decoration: none;
      border-radius: 999px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>💍 婚礼模板商店</h1>
    <p>高质量婚礼请柬、誓言卡、菜单、桌卡与感谢卡模板</p>

    <div class="card">
      <h2>极简婚礼模板</h2>
      <p>包含：请柬 / 誓言卡 / 菜单 / 桌卡 / 感谢卡</p>
      <div class="price">￥29</div>
      <a class="btn" href="#">立即购买</a>
    </div>
  </div>
</body>
</html>
